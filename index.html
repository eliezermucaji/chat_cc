<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chat em Grupo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        /* Dark mode body */
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Dark mode chat container */
        body.dark-mode .chat-container {
            background: #1e1e2e;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Header do chat */
        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e9ecef;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Dark mode header */
        body.dark-mode .chat-header {
            background: #2d2d3a;
            border-bottom: 1px solid #3d3d4a;
        }

        .chat-header h1 {
            font-size: 1.3rem;
            color: #495057;
            margin-bottom: 5px;
            transition: all 0.3s ease;
        }

        /* Dark mode header title */
        body.dark-mode .chat-header h1 {
            color: #e0e0e0;
        }

        .chat-header p {
            font-size: 0.85rem;
            color: #6c757d;
            transition: all 0.3s ease;
        }

        /* Dark mode header subtitle */
        body.dark-mode .chat-header p {
            color: #a0a0b0;
        }

        /* Dark mode toggle button */
        .dark-mode-toggle {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: #667eea;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .dark-mode-toggle:hover {
            transform: translateY(-50%) scale(1.1);
        }

        body.dark-mode .dark-mode-toggle {
            background: #764ba2;
        }

        /* Área de mensagens */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }

        /* Dark mode messages area */
        body.dark-mode .messages-area {
            background: #1a1a2a;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 12px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
            transition: all 0.3s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.received {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* Dark mode received message */
        body.dark-mode .message.received {
            background: #2d2d3a;
            color: #e0e0e0;
        }

        .message.sent {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* Dark mode sent message */
        body.dark-mode .message.sent {
            background: #764ba2;
        }

        /* Estilo para mensagem respondida */
        .reply-preview {
            background: rgba(0, 0, 0, 0.1);
            border-left: 3px solid #667eea;
            padding: 5px 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        body.dark-mode .reply-preview {
            background: rgba(255, 255, 255, 0.1);
            border-left-color: #764ba2;
        }

        .reply-sender {
            font-weight: bold;
            margin-bottom: 3px;
            font-size: 0.75rem;
        }

        .reply-text {
            opacity: 0.8;
            font-style: italic;
        }

        .message-text {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message-time {
            font-size: 0.7rem;
            margin-top: 5px;
            opacity: 0.7;
            text-align: right;
        }

        /* Botão de responder */
        .reply-button {
            position: absolute;
            right: 10px;
            bottom: 5px;
            background: rgba(0, 0, 0, 0.1);
            border: none;
            border-radius: 15px;
            padding: 2px 8px;
            font-size: 0.7rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            color: inherit;
        }

        .message:hover .reply-button {
            opacity: 1;
        }

        body.dark-mode .reply-button {
            background: rgba(255, 255, 255, 0.2);
        }

        .reply-button:hover {
            background: rgba(0, 0, 0, 0.2);
        }

        body.dark-mode .reply-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Input area */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
            transition: all 0.3s ease;
        }

        /* Dark mode input area */
        body.dark-mode .input-area {
            background: #2d2d3a;
            border-top: 1px solid #3d3d4a;
        }

        /* Preview de resposta */
        .reply-preview-area {
            background: #f1f3f5;
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 10px;
            display: none;
            position: relative;
            border-left: 3px solid #667eea;
        }

        body.dark-mode .reply-preview-area {
            background: #1a1a2a;
            border-left-color: #764ba2;
        }

        .reply-preview-area.active {
            display: block;
        }

        .reply-preview-content {
            font-size: 0.85rem;
        }

        .reply-preview-sender {
            font-weight: bold;
            margin-bottom: 3px;
        }

        .reply-preview-text {
            opacity: 0.8;
            font-style: italic;
            word-break: break-word;
        }

        .cancel-reply {
            position: absolute;
            right: 8px;
            top: 8px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: #6c757d;
            padding: 0 4px;
        }

        .cancel-reply:hover {
            color: #dc3545;
        }

        .input-form {
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
            background: white;
            color: #495057;
        }

        /* Dark mode input */
        body.dark-mode .message-input {
            background: #1a1a2a;
            border: 2px solid #3d3d4a;
            color: #e0e0e0;
        }

        body.dark-mode .message-input::placeholder {
            color: #6c757d;
        }

        .message-input:focus {
            border-color: #667eea;
        }

        body.dark-mode .message-input:focus {
            border-color: #764ba2;
        }

        .send-button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .send-button:hover {
            background: #5a67d8;
            transform: translateY(-1px);
        }

        .send-button:active {
            transform: translateY(0);
        }

        /* Dark mode send button */
        body.dark-mode .send-button {
            background: #764ba2;
        }

        body.dark-mode .send-button:hover {
            background: #5a3780;
        }

        /* Mensagem vazia */
        .empty-messages {
            text-align: center;
            color: #6c757d;
            padding: 40px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        /* Dark mode empty message */
        body.dark-mode .empty-messages {
            color: #a0a0b0;
        }

        /* Scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 3px;
        }

        /* Dark mode scrollbar */
        body.dark-mode .messages-area::-webkit-scrollbar-track {
            background: #2d2d3a;
        }

        body.dark-mode .messages-area::-webkit-scrollbar-thumb {
            background: #764ba2;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .chat-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }
            
            .message {
                max-width: 85%;
            }

            .dark-mode-toggle {
                width: 35px;
                height: 35px;
                font-size: 1rem;
            }

            .reply-button {
                opacity: 1;
                bottom: 2px;
                right: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>💬 Chat do Grupo</h1>
            <p>Conversa em grupo</p>
            <button class="dark-mode-toggle" id="darkModeToggle">🌙</button>
        </div>
        
        <div class="messages-area" id="messagesArea">
            <div class="empty-messages">
                💬 Nenhuma mensagem ainda<br>
                Seja o primeiro a enviar uma mensagem!
            </div>
        </div>
        
        <div class="input-area">
            <div class="reply-preview-area" id="replyPreviewArea">
                <button class="cancel-reply" id="cancelReplyBtn">✕</button>
                <div class="reply-preview-content">
                    <div class="reply-preview-sender" id="replyPreviewSender">Respondendo a:</div>
                    <div class="reply-preview-text" id="replyPreviewText"></div>
                </div>
            </div>
            <form class="input-form" id="messageForm">
                <input 
                    type="text" 
                    class="message-input" 
                    id="messageInput" 
                    placeholder="Digite sua mensagem..."
                    autocomplete="off"
                >
                <button type="submit" class="send-button">Enviar</button>
            </form>
        </div>
    </div>
    <script src="https://backend-chat-message.onrender.com/socket.io/socket.io.js"></script>
    <script>
        // Dark mode functionality
        const darkModeToggle = document.getElementById('darkModeToggle');
        const body = document.body;
        
        // Check for saved dark mode preference
        const savedDarkMode = localStorage.getItem('darkMode');
        if (savedDarkMode === 'enabled') {
            body.classList.add('dark-mode');
            darkModeToggle.textContent = '☀️';
        }
        
        // Toggle dark mode
        darkModeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('darkMode', 'enabled');
                darkModeToggle.textContent = '☀️';
            } else {
                localStorage.setItem('darkMode', 'disabled');
                darkModeToggle.textContent = '🌙';
            }
        });
        
        // Armazenar mensagens
        const socket = io("https://backend-chat-message.onrender.com/");
        let messages = [];
        let replyingTo = null; // Armazenar mensagem que está sendo respondida
        
        socket.on('connect', (msg)=>{
            console.log("Online");
        });
        
        // Função para formatar hora atual
        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }
        
        // Função para escapar HTML (prevenir XSS)
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Função para truncar texto longo
        function truncateText(text, maxLength = 50) {
            if (text.length <= maxLength) return text;
            return text.substring(0, maxLength) + '...';
        }
        
        // Função para criar elemento de mensagem
        function createMessageElement(message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${message.isSent ? 'sent' : 'received'}`;
            messageDiv.setAttribute('data-message-id', message.id);
            
            let html = '';
            
            // Adicionar preview da mensagem respondida se existir
            if (message.replyTo) {
                html += `
                    <div class="reply-preview">
                        <div class="reply-sender">↳ Respondendo a: ${escapeHtml(message.replyTo.sender || 'Alguém')}</div>
                        <div class="reply-text">${escapeHtml(truncateText(message.replyTo.text, 60))}</div>
                    </div>
                `;
            }
            
            html += `
                <div class="message-text">${escapeHtml(message.text)}</div>
                <div class="message-time">${message.time}</div>
                <button class="reply-button" onclick="setReplyTo(${message.id})">↩ Responder</button>
            `;
            
            messageDiv.innerHTML = html;
            return messageDiv;
        }
        
        // Função para definir qual mensagem será respondida
        window.setReplyTo = function(messageId) {
            const message = messages.find(m => m.id === messageId);
            if (message) {
                replyingTo = message;
                const replyPreviewArea = document.getElementById('replyPreviewArea');
                const replyPreviewSender = document.getElementById('replyPreviewSender');
                const replyPreviewText = document.getElementById('replyPreviewText');
                
                replyPreviewSender.textContent = `Respondendo a: ${message.isSent ? 'Você' : 'Alguém'}`;
                replyPreviewText.textContent = truncateText(message.text, 80);
                replyPreviewArea.classList.add('active');
                
                // Focar no input
                document.getElementById('messageInput').focus();
            }
        };
        
        // Cancelar resposta
        document.getElementById('cancelReplyBtn').addEventListener('click', () => {
            replyingTo = null;
            document.getElementById('replyPreviewArea').classList.remove('active');
        });
        
        // Renderizar todas as mensagens
        function renderMessages() {
            const messagesArea = document.getElementById('messagesArea');
            
            if (messages.length === 0) {
                messagesArea.innerHTML = `
                    <div class="empty-messages">
                        💬 Nenhuma mensagem ainda<br>
                        Seja o primeiro a enviar uma mensagem!
                    </div>
                `;
                return;
            }
            
            messagesArea.innerHTML = '';
            
            messages.forEach(message => {
                const messageDiv = createMessageElement(message);
                messagesArea.appendChild(messageDiv);
            });
            
            // Scroll para a última mensagem
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        // Enviar mensagem
        function sendMessage(text) {
            if (!text || text.trim() === '') {
                return false;
            }
            
            const newMessage = {
                token_id: socket.id,
                id: Date.now(),
                text: text.trim(),
                time: getCurrentTime(),
                isSent: true
            };
            
            // Adicionar informação de resposta se houver
            if (replyingTo) {
                newMessage.replyTo = {
                    id: replyingTo.id,
                    text: replyingTo.text,
                    sender: replyingTo.isSent ? 'Você' : 'Alguém'
                };
                // Limpar resposta após enviar
                replyingTo = null;
                document.getElementById('replyPreviewArea').classList.remove('active');
            }
            
            socket.emit('enviar_mensagem', newMessage);
            return true;
        }
        
        // Receber novas mensagens
        socket.on('novamensagem', (msg) => {
            const message = msg.msg;
            message.isSent = socket.id == msg.token_id;
            messages.push(message);
            
            const messagesArea = document.getElementById('messagesArea');
            
            // Remover mensagem vazia se existir
            if (messagesArea.querySelector('.empty-messages')) {
                messagesArea.innerHTML = '';
            }
            
            const messageDiv = createMessageElement(message);
            messagesArea.appendChild(messageDiv);
            
            // Auto scroll
            messagesArea.scrollTop = messagesArea.scrollHeight;
        });
        
        // Inicializar chat
        function init() {
            const messageForm = document.getElementById('messageForm');
            const messageInput = document.getElementById('messageInput');
            
            messageForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const messageText = messageInput.value;
                if (sendMessage(messageText)) {
                    messageInput.value = '';
                    messageInput.focus();
                }
            });
        }
        
        // Iniciar aplicação
        init();
    </script>
</body>
</html>
