<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NeuserChat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        /* Dark mode body */
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Dark mode chat container */
        body.dark-mode .chat-container {
            background: #1e1e2e;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Header do chat */
        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e9ecef;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Dark mode header */
        body.dark-mode .chat-header {
            background: #2d2d3a;
            border-bottom: 1px solid #3d3d4a;
        }

        .chat-header h1 {
            font-size: 1.3rem;
            color: #495057;
            margin-bottom: 5px;
            transition: all 0.3s ease;
        }

        /* Dark mode header title */
        body.dark-mode .chat-header h1 {
            color: #e0e0e0;
        }

        .chat-header p {
            font-size: 0.85rem;
            color: #6c757d;
            transition: all 0.3s ease;
        }

        /* Dark mode header subtitle */
        body.dark-mode .chat-header p {
            color: #a0a0b0;
        }

        /* Dark mode toggle button */
        .dark-mode-toggle {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: #667eea;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .dark-mode-toggle:hover {
            transform: translateY(-50%) scale(1.1);
        }

        body.dark-mode .dark-mode-toggle {
            background: #764ba2;
        }

        /* Lista de chats */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .chat-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        body.dark-mode .chat-item {
            background: #2d2d3a;
        }

        .chat-item:hover {
            transform: translateX(5px);
            background: #e9ecef;
        }

        body.dark-mode .chat-item:hover {
            background: #3d3d4a;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
            color: #495057;
        }

        body.dark-mode .chat-name {
            color: #e0e0e0;
        }

        .chat-stats {
            font-size: 0.85rem;
            color: #6c757d;
        }

        body.dark-mode .chat-stats {
            color: #a0a0b0;
        }

        .chat-password-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* Botões */
        .create-chat-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            margin: 20px;
            transition: all 0.3s;
        }

        .create-chat-btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        body.dark-mode .create-chat-btn {
            background: #764ba2;
        }

        .back-button {
            background: #6c757d;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            transition: all 0.3s;
        }

        .back-button:hover {
            background: #5a6268;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        body.dark-mode .modal-content {
            background: #2d2d3a;
            color: #e0e0e0;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
        }

        body.dark-mode .modal-content input {
            background: #1a1a2a;
            border-color: #3d3d4a;
            color: #e0e0e0;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .confirm-btn {
            background: #667eea;
            color: white;
        }

        .confirm-btn:hover {
            background: #5a67d8;
        }

        .cancel-btn {
            background: #6c757d;
            color: white;
        }

        .cancel-btn:hover {
            background: #5a6268;
        }

        .error-message {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: -10px;
            margin-bottom: 15px;
            text-align: center;
        }

        /* Área de mensagens */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }

        body.dark-mode .messages-area {
            background: #1a1a2a;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 12px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
            transition: all 0.3s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.received {
            background: #6c757d;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: #ffffff;
        }

        body.dark-mode .message.received {
            background: #2d2d3a;
            color: #e0e0e0;
        }

        .message.sent {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        body.dark-mode .message.sent {
            background: #764ba2;
        }

        /* Reply badge */
        .reply-badge {
            background: rgba(0,0,0,0.15);
            padding: 6px 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.75rem;
            border-left: 3px solid;
        }

        .message.sent .reply-badge {
            border-left-color: rgba(255,255,255,0.5);
        }

        .message.received .reply-badge {
            border-left-color: rgba(255,255,255,0.5);
        }

        .reply-sender {
            font-weight: bold;
            margin-bottom: 2px;
        }

        .reply-text {
            font-style: italic;
            opacity: 0.9;
        }

        .message-text {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .message-image:hover {
            transform: scale(1.02);
        }

        .message-time {
            font-size: 0.7rem;
            margin-top: 5px;
            opacity: 0.7;
            text-align: right;
        }

        body.dark-mode .message-time {
            color: #a0a0b0;
        }

        /* Reply button */
        .reply-button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.7rem;
            margin-top: 5px;
            padding: 2px 8px;
            border-radius: 12px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .message.sent .reply-button {
            color: rgba(255,255,255,0.8);
        }

        .message.received .reply-button {
            color: rgba(255,255,255,0.8);
        }

        .reply-button:hover {
            background: rgba(0,0,0,0.15);
            transform: scale(1.05);
        }

        /* Input area */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
            transition: all 0.3s ease;
        }

        body.dark-mode .input-area {
            background: #2d2d3a;
            border-top: 1px solid #3d3d4a;
        }

        .reply-preview {
            background: #f0f0f0;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            animation: slideDown 0.3s ease;
        }

        body.dark-mode .reply-preview {
            background: #1a1a2a;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reply-preview-content {
            flex: 1;
        }

        .reply-preview-label {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 3px;
        }

        .reply-preview-text {
            color: #6c757d;
            font-size: 0.8rem;
            font-style: italic;
        }

        .cancel-reply {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 5px;
            transition: all 0.2s;
        }

        .cancel-reply:hover {
            transform: scale(1.1);
        }

        .input-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
            background: white;
            color: #495057;
            resize: none;
            min-height: 45px;
            max-height: 100px;
        }

        body.dark-mode .message-input {
            background: #1a1a2a;
            border-color: #3d3d4a;
            color: #e0e0e0;
        }

        .message-input:focus {
            border-color: #667eea;
        }

        /* Botões alinhados à direita */
        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .photo-button {
            padding: 12px 20px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .photo-button:hover {
            background: #5a6268;
            transform: translateY(-1px);
        }

        .send-button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .send-button:hover {
            background: #5a67d8;
            transform: translateY(-1px);
        }

        .empty-messages {
            text-align: center;
            color: #6c757d;
            padding: 40px;
            font-size: 0.9rem;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        /* Responsividade Mobile */
        @media (max-width: 768px) {
            .chat-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }
            
            .message {
                max-width: 85%;
            }
            
            .input-form {
                flex-direction: column;
                gap: 8px;
            }
            
            .input-wrapper {
                width: 100%;
                flex-direction: column;
                gap: 8px;
            }
            
            .message-input {
                width: 100%;
                font-size: 0.9rem;
                padding: 10px 12px;
            }
            
            .action-buttons {
                width: 100%;
                display: flex;
                gap: 8px;
                justify-content: space-between;
            }
            
            .photo-button, .send-button {
                flex: 1;
                text-align: center;
                padding: 10px 16px;
                font-size: 0.85rem;
                white-space: nowrap;
            }
        }

        @media (max-width: 480px) {
            .photo-button, .send-button {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
            
            .reply-preview {
                font-size: 0.75rem;
                padding: 8px 12px;
            }
            
            .chat-header h1 {
                font-size: 1.1rem;
            }
            
            .back-button, .dark-mode-toggle {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }
            
            .back-button {
                padding: 5px 10px;
                font-size: 0.75rem;
            }
        }

        /* Scrollbar Personalizada */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        body.dark-mode ::-webkit-scrollbar-track {
            background: #2d2d3a;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="chat-container" id="app">
        <!-- Página de lista de chats será inserida aqui -->
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h2 id="modalTitle">Criar Novo Chat</h2>
            <input type="text" id="chatName" placeholder="Nome do chat">
            <input type="password" id="chatPassword" placeholder="Senha">
            <div class="error-message" id="errorMessage"></div>
            <div class="modal-buttons">
                <button class="confirm-btn" id="confirmBtn">Confirmar</button>
                <button class="cancel-btn" id="cancelBtn">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="modal" id="imageModal">
        <img id="modalImage" alt="Imagem ampliada">
    </div>

    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script>
        // Estado da aplicação
        const endpoint = "http://localhost:3000";
        let currentChat = null;
        let chats = [];
        let messages = [];
        let socket = null;
        let currentModalType = null; // 'create' ou 'enter'
        let selectedChatForEntry = null;
        let replyToMessage = null; // Armazena a mensagem que está sendo respondida
        
        // Inicializar socket
        function initSocket() {
            if (socket) {
                socket.disconnect();
            }
            socket = io(endpoint);
            
            // Eventos do socket
            socket.on('connect', () => {
                console.log('Conectado ao servidor');
                // Reconectar ao chat atual se existir
                if (currentChat) {
                    socket.emit('entrar_chat', currentChat.id);
                }
            });
            
            socket.on('disconnect', () => {
                console.log('Desconectado do servidor');
                // Atualizar status online quando desconectar
                const onlineMarker = document.getElementById('online_marker');
                if (onlineMarker && currentChat) {
                    onlineMarker.innerText = 'Offline';
                }
            });
            
            socket.on('novochat', (data)=>{
                //Adicionar na lista de chats
                const chat = data.chat;
                if(chat.user_token != socket.id) {
                    chats.push(chat);
                    if(!currentChat) {
                        renderChatsList();
                    }
                }
            });
            
            socket.on(`nova_mensagem`, (data)=>{
                if(data.user_id != socket.id) {
                    const message = data;
                    message.isSent = false;
                    messages.push(message);
                    if (currentChat) {
                        const messagesArea = document.getElementById('messagesArea');
                        if (messagesArea) {
                            const emptyMsg = messagesArea.querySelector('.empty-messages');
                            if (emptyMsg) emptyMsg.remove();
                            messagesArea.appendChild(createMessageElement(message));
                            messagesArea.scrollTop = messagesArea.scrollHeight;
                        }
                    }
                }
            });
            
            socket.on(`online_chat`, (dados)=>{
                const online = document.getElementById('online_marker');
                if(online && currentChat) {
                    online.innerText = `${dados} Online`;
                }
            });
        }
        
        // Carregar chats
        async function loadChats() {
            try {
                let request = await fetch(`${endpoint}/chats`);
                let anser = await request.json();

                if(request.status == 200) {
                    let chates = anser.chats;
                    chats = chates;
                    renderChatsList();
                }
            } catch (error) {
                console.error('Erro ao carregar chats:', error);
            }
        }

        // Renderizar lista de chats
        function renderChatsList() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="chat-header">
                    <h1>💬 NeuserChat | Online mode</h1>
                    <p>Selecione um chat para conversar</p>
                    <button class="dark-mode-toggle" id="darkModeToggle">🌙</button>
                </div>
                <div class="chats-list" id="chatsList">
                    ${chats.map(chat => `
                        <div class="chat-item" data-chat-id="${chat.id}">
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(chat.nome)}</div>
                                <div class="chat-stats"> Este chat é ${chat.is_private ? 'privado' : 'público.'}.</div>
                            </div>
                            ${chat.is_private ? '<div class="chat-password-badge" style="background: #ffc107; color: #856404;">🔒 Protegido</div>' : '<div class="chat-password-badge" style="background: #28a745; color: white;">🔓 Aberto</div>'}
                        </div>
                    `).join('')}
                </div>
                <button class="create-chat-btn" id="createChatBtn">+ Criar Novo Chat</button>
            `;

            // Adicionar eventos
            document.querySelectorAll('.chat-item').forEach(item => {
                item.addEventListener('click', () => {
                    const chatId = item.dataset.chatId;
                    const chat = chats.find(c => c.id === chatId);
                    if (chat.is_private) {
                        showEnterPasswordModal(chat);
                    } else {
                        enterChat(chat);
                    }
                });
            });

            const createBtn = document.getElementById('createChatBtn');
            if (createBtn) {
                createBtn.addEventListener('click', () => {
                    showCreateChatModal();
                });
            }

            initDarkMode();
        }

        // Mostrar modal para entrar no chat com senha
        function showEnterPasswordModal(chat) {
            currentModalType = 'enter';
            selectedChatForEntry = chat;
            
            document.getElementById('modalTitle').textContent = `🔒 Entrar em: ${chat.nome}`;
            document.getElementById('chatName').style.display = 'none';
            document.getElementById('chatPassword').value = '';
            document.getElementById('chatPassword').placeholder = 'Digite a senha do chat';
            document.getElementById('errorMessage').textContent = '';
            
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        // Mostrar modal de criar chat
        function showCreateChatModal() {
            currentModalType = 'create';
            selectedChatForEntry = null;
            
            document.getElementById('modalTitle').textContent = '➕ Criar Novo Chat';
            document.getElementById('chatName').style.display = 'block';
            document.getElementById('chatName').value = '';
            document.getElementById('chatPassword').value = '';
            document.getElementById('chatPassword').placeholder = 'Senha (opcional)';
            document.getElementById('errorMessage').textContent = '';
            
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            currentModalType = null;
            selectedChatForEntry = null;
            document.getElementById('errorMessage').textContent = '';
        }

        // Entrar no chat
        function enterChat(chat) {
            currentChat = chat;
            replyToMessage = null;
            
            // Sair do chat anterior se existir
            if (socket && currentChat) {
                socket.emit('entrar_chat', chat.id);
            }
            
            renderChatInterface();
        }

        function createMessageElement(message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${message.isSent ? 'sent' : 'received'}`;
            messageDiv.setAttribute('data-message-id', message.id);
            
            // Adicionar reply badge se houver resposta
            let replyHtml = '';
            if (message.replyTo) {
                replyHtml = `
                    <div class="reply-badge">
                        <div class="reply-sender">↩️ Respondendo a 'Alguém'</div>
                        <div class="reply-text">"${escapeHtml(message.replyTo.text.substring(0, 60))}${message.replyTo.text.length > 60 ? '...' : ''}"</div>
                    </div>
                `;
            }
            
            if (message.type === 'image') {
                messageDiv.innerHTML = `
                    ${replyHtml}
                    <img src="${escapeHtml(message.text)}" class="message-image" onclick="openImageModal('${escapeHtml(message.text)}')" alt="Imagem">
                    <div class="message-time">${message.time}</div>
                    <button class="reply-button" onclick="event.stopPropagation(); replyToMessageById('${message.id}')">↩️ Responder</button>
                `;
            } else {
                messageDiv.innerHTML = `
                    ${replyHtml}
                    <div class="message-text">${escapeHtml(message.text)}</div>
                    <div class="message-time">${message.time}</div>
                    <button class="reply-button" onclick="event.stopPropagation(); replyToMessageById('${message.id}')">↩️ Responder</button>
                `;
            }
            
            return messageDiv;
        }

        function renderChatInterface() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="chat-header">
                    <button class="back-button" id="backButton">← Voltar</button>
                    <h1>💬 ${escapeHtml(currentChat.nome)}</h1>
                    <p id="online_marker">Carregando...</p>
                    <button class="dark-mode-toggle" id="darkModeToggle">🌙</button>
                </div>
                <div class="messages-area" id="messagesArea">
                    ${messages.length === 0 ? '<div class="empty-messages">💬 Nenhuma mensagem ainda<br>Seja o primeiro a enviar uma mensagem!</div>' : ''}
                </div>
                <div class="input-area">
                    <div id="replyPreview" class="reply-preview" style="display: none;">
                        <div class="reply-preview-content">
                            <div class="reply-preview-label">Respondendo a <span id="replyToName"></span></div>
                            <div class="reply-preview-text" id="replyToText"></div>
                        </div>
                        <button class="cancel-reply" onclick="cancelReply()">✕</button>
                    </div>
                    <form class="input-form" id="messageForm">
                        <div class="input-wrapper">
                            <textarea class="message-input" id="messageInput" placeholder="Digite sua mensagem..." autocomplete="off" rows="1"></textarea>
                        </div>
                        <div class="action-buttons">
                            <button type="button" class="photo-button" id="photoButton">📷 Foto</button>
                            <button type="submit" class="send-button">Enviar</button>
                        </div>
                    </form>
                    <input type="file" id="photoInput" accept="image/*" style="display: none;">
                </div>
            `;
            
            // Renderizar mensagens existentes
            const messagesArea = document.getElementById('messagesArea');
            if (messages.length > 0) {
                messagesArea.innerHTML = '';
                messages.forEach(message => {
                    messagesArea.appendChild(createMessageElement(message));
                });
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }
            
            // Auto-resize do textarea
            const messageInput = document.getElementById('messageInput');
            if (messageInput) {
                messageInput.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
                });
            }
            
            // Eventos do chat
            const backButton = document.getElementById('backButton');
            if (backButton) {
                backButton.addEventListener('click', () => {
                    if(currentChat && socket) {
                        socket.emit('disconect_chat', currentChat.id);
                        currentChat = null;
                        messages = [];
                        replyToMessage = null;
                        renderChatsList();
                    }
                });
            }
            
            const messageForm = document.getElementById('messageForm');
            const photoButton = document.getElementById('photoButton');
            const photoInput = document.getElementById('photoInput');
            
            if (messageForm) {
                messageForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const messageText = document.getElementById('messageInput').value;
                    if (sendTextMessage(messageText)) {
                        document.getElementById('messageInput').value = '';
                        document.getElementById('messageInput').style.height = 'auto';
                        document.getElementById('messageInput').focus();
                    }
                });
            }
            
            if (photoButton) {
                photoButton.addEventListener('click', () => {
                    photoInput.click();
                });
            }
            
            if (photoInput) {
                photoInput.addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    if (file && file.type.startsWith('image/')) {
                        if (file.size > 5 * 1024 * 1024) {
                            alert('A imagem deve ter no máximo 5MB!');
                            photoInput.value = '';
                            return;
                        }
                        const success = await sendImageMessage(file);
                        if (!success) alert('Erro ao enviar imagem.');
                        photoInput.value = '';
                    }
                });
            }
            
            initDarkMode();
        }

        // Função para responder a uma mensagem
        window.replyToMessageById = function(messageId) {
            const messageToReply = messages.find(m => m.id.toString() === messageId.toString());
            if (messageToReply) {
                replyToMessage = {
                    id: messageToReply.id,
                    sender: messageToReply.isSent ? 'Você' : (messageToReply.user_id || 'Alguém'),
                    text: messageToReply.type === 'image' ? '📷 [Imagem]' : messageToReply.text
                };
                
                const replyPreview = document.getElementById('replyPreview');
                if (replyPreview) {
                    document.getElementById('replyToName').textContent = replyToMessage.sender;
                    document.getElementById('replyToText').textContent = 
                        replyToMessage.text.length > 60 ? replyToMessage.text.substring(0, 60) + '...' : replyToMessage.text;
                    replyPreview.style.display = 'flex';
                    document.getElementById('messageInput').focus();
                }
            }
        };
        
        // Função para cancelar resposta
        window.cancelReply = function() {
            replyToMessage = null;
            const replyPreview = document.getElementById('replyPreview');
            if (replyPreview) {
                replyPreview.style.display = 'none';
            }
        };

        function sendTextMessage(text) {
            if (!text || text.trim() === '') return false;
            
            const message = {
                user_id: socket.id,
                id: Date.now(),
                text: text.trim(),
                time: getCurrentTime(),
                isSent: true,
                type: 'text',
                replyTo: replyToMessage ? {
                    id: replyToMessage.id,
                    sender: replyToMessage.sender,
                    text: replyToMessage.text
                } : null
            };
            
            if(!currentChat || !socket) return false;
            
            messages.push(message);
            
            const messagesArea = document.getElementById('messagesArea');
            if (messagesArea) {
                const emptyMsg = messagesArea.querySelector('.empty-messages');
                if (emptyMsg) emptyMsg.remove();
                messagesArea.appendChild(createMessageElement(message));
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }
            
            const chatid = currentChat.id;
            socket.emit('enviar_mensagem', {chatid, message});
            
            // Limpar resposta após enviar
            cancelReply();
            
            return true;
        }
    
        async function sendImageMessage(file) {
            if (!file) return false;
            
            try {
                const base64Image = await imageToBase64(file);
                const message = {
                    user_id: socket.id,
                    id: Date.now(),
                    text: base64Image,
                    time: getCurrentTime(),
                    isSent: true,
                    type: 'image',
                    replyTo: replyToMessage ? {
                        id: replyToMessage.id,
                        sender: replyToMessage.sender,
                        text: replyToMessage.text
                    } : null
                };
                
                if(!currentChat || !socket) return false;
            
                messages.push(message);
                
                const messagesArea = document.getElementById('messagesArea');
                if (messagesArea) {
                    const emptyMsg = messagesArea.querySelector('.empty-messages');
                    if (emptyMsg) emptyMsg.remove();
                    messagesArea.appendChild(createMessageElement(message));
                    messagesArea.scrollTop = messagesArea.scrollHeight;
                }
                
                const chatid = currentChat.id;
                socket.emit('enviar_mensagem', {chatid, message});
                
                // Limpar resposta após enviar
                cancelReply();
                
                return true;

            } catch (error) {
                console.error('Erro ao enviar imagem:', error);
                return false;
            }
        }

        async function verifyPass(data) {
            const request = await fetch(`${endpoint}/chat/entrar`, {
                method:"POST",
                headers: {
                    'Accept':'application/json',
                    'Content-Type':'application/json',
                },
                body: JSON.stringify(data)
            })

            if(request.status == 200) {
                return true;
            }

            return false;
        }

        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        function imageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.openImageModal = function(imageUrl) {
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            if (modal && modalImage) {
                modalImage.src = imageUrl;
                modal.style.display = 'flex';
            }
        };

        if (document.getElementById('imageModal')) {
            document.getElementById('imageModal').addEventListener('click', function() {
                this.style.display = 'none';
            });
        }

        function initDarkMode() {
            const darkModeToggle = document.getElementById('darkModeToggle');
            if (!darkModeToggle) return;
            
            const savedDarkMode = localStorage.getItem('darkMode');
            if (savedDarkMode === 'enabled') {
                document.body.classList.add('dark-mode');
                darkModeToggle.textContent = '☀️';
            }
            
            darkModeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                if (document.body.classList.contains('dark-mode')) {
                    localStorage.setItem('darkMode', 'enabled');
                    darkModeToggle.textContent = '☀️';
                } else {
                    localStorage.setItem('darkMode', 'disabled');
                    darkModeToggle.textContent = '🌙';
                }
            });
        }

        async function criarChat(chat) {
            let request = await fetch(`${endpoint}/chats`, {
                method:    "POST",
                headers :{
                    'Content-Type':'application/json',
                    'Accept':'application/json'
                },
                body: JSON.stringify(chat)
            });

            return request.status;
        }

        // Configurar modal
        const confirmBtn = document.getElementById('confirmBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        
        if (confirmBtn) {
            confirmBtn.addEventListener('click', async () => {
                if (currentModalType === 'create') {
                    const name = document.getElementById('chatName').value;
                    const password = document.getElementById('chatPassword').value;
                    
                    if (!name.trim()) {
                        document.getElementById('errorMessage').textContent = '❌ Nome do chat é obrigatório!';
                        return;
                    }
                    
                    const newChat = {
                        id: Date.now().toString(),
                        nome: name.trim(),
                        is_private: password != '',
                        senha: password || '',
                        user_token: socket.id
                    };
                    
                    if(await criarChat(newChat) == 403) {
                        document.getElementById('errorMessage').textContent = '❌ Já existe um número máximo de chats';
                        return;
                    }

                    chats.push(newChat);
                    closeModal();
                    renderChatsList();
                    
                } else if (currentModalType === 'enter') {
                    const enteredPassword = document.getElementById('chatPassword').value;

                    const data = {
                        id:selectedChatForEntry.id,
                        senha:enteredPassword,
                    };

                    if (await verifyPass(data)) {
                        const temp = selectedChatForEntry;
                        closeModal();
                        enterChat(temp);
                    } else {
                        document.getElementById('errorMessage').textContent = '❌ Senha incorreta! Tente novamente.';
                        document.getElementById('chatPassword').value = '';
                        document.getElementById('chatPassword').focus();
                    }
                }
            });
        }
        
        if (cancelBtn) {
            cancelBtn.addEventListener('click', closeModal);
        }
        
        // Inicializar aplicação
        initSocket();
        loadChats();
        
        // Evento de beforeunload para desconectar ao recarregar a página
        window.addEventListener('beforeunload', () => {
            if (socket && currentChat) {
                socket.emit('disconect_chat', currentChat.id);
                socket.disconnect();
            }
        });
        
        // Reconectar ao carregar a página
        window.addEventListener('load', () => {
            if (socket && currentChat) {
                socket.emit('entrar_chat', currentChat.id);
            }
        });
    </script>
</body>
</html>
